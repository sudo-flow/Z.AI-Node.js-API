version: '3.8'

services:
  zai-endpoint:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: zai-endpoint-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DEFAULT_PROVIDER_API_KEY: ${DEFAULT_PROVIDER_API_KEY:-${ZAI_API_KEY}}
      DEFAULT_PROVIDER_BASE_URL: ${DEFAULT_PROVIDER_BASE_URL:-https://api.z.ai/api/coding/paas/v4/}
      DEFAULT_PROVIDER_TIMEOUT: ${DEFAULT_PROVIDER_TIMEOUT:-300000}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY_PRINT: ${LOG_PRETTY_PRINT:-false}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      HEALTH_CHECK_INTERVAL: ${HEALTH_CHECK_INTERVAL:-30000}
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - zai-network

  # Optional: Redis for rate limiting and caching
  redis:
    image: redis:7-alpine
    container_name: zai-endpoint-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - zai-network

volumes:
  redis-data:
    driver: local

networks:
  zai-network:
    driver: bridge